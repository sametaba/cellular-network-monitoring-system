services:
  db:
    image: postgis/postgis:16-3.4
    container_name: cellular_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=cellular_monitor
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: cellular_app
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Override DATABASE_URL to use the service name 'db' instead of localhost
      - DATABASE_URL=postgresql+asyncpg://postgres:admin@db:5432/cellular_monitor
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped